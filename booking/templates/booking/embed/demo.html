<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timebaibai 埋め込みデモ</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  iframe { border: none; display: block; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-4xl mx-auto px-4 py-8">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-800">{{ store.name }}</h1>
    <p class="text-gray-500 text-sm mt-1">WordPress 埋め込みデモページ</p>
    <p class="text-xs text-indigo-500 mt-2">iframe内で予約フロー完結（スタッフ選択 → カレンダー → 予約確認 → メール認証 → 完了）</p>
  </div>

  <!-- 予約カレンダー -->
  <section class="mb-10">
    <h2 class="text-lg font-semibold text-gray-700 mb-3">予約カレンダー</h2>
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <iframe
        src="/embed/booking/{{ store.pk }}/?api_key={{ api_key }}"
        width="100%" height="700" loading="lazy"
        title="予約カレンダー"></iframe>
    </div>
  </section>

  <!-- 本日のシフト -->
  <section class="mb-10">
    <h2 class="text-lg font-semibold text-gray-700 mb-3">本日の出勤キャスト</h2>
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <iframe
        src="/embed/shift/{{ store.pk }}/?api_key={{ api_key }}"
        width="100%" height="380" loading="lazy"
        title="本日のシフト"></iframe>
    </div>
  </section>

  <footer class="text-center text-xs text-gray-400 mt-12 pb-4">
    Powered by <a href="https://timebaibai.com" class="underline hover:text-gray-600">Timebaibai</a>
  </footer>
</div>

</body>
</html>
