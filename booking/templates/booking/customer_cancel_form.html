{% extends 'booking/base.html' %}
{% load i18n %}

{% block title %}{% trans "予約キャンセル" %}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 mb-10">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        <h1 class="text-2xl font-bold text-salon-dark mb-2 text-center">{% trans "予約キャンセル" %}</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">{% trans "キャンセル番号を入力してください" %}</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <p class="text-sm text-red-700">{{ error }}</p>
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label for="cancel_token" class="block text-sm font-medium text-gray-700 mb-1">{% trans "キャンセル番号" %}</label>
                <input type="text" name="cancel_token" id="cancel_token"
                       maxlength="8" required autocomplete="off"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-lg tracking-widest uppercase focus:ring-2 focus:ring-salon-brown focus:border-salon-brown"
                       placeholder="AB12CD34"
                       value="{{ cancel_token_input|default:'' }}">
            </div>
            <button type="submit"
                    class="w-full bg-salon-brown text-white py-3 rounded-lg font-medium hover:opacity-80 transition">
                {% trans "確認する" %}
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'booking:booking_top' %}" class="text-sm text-gray-500 hover:underline">{% trans "トップへ戻る" %}</a>
        </div>
    </div>
</div>
{% endblock %}
