<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>メンテナンス中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f0e8;
            color: #4a4539;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 {
            font-size: 1.5rem;
            color: #8c876c;
            margin-bottom: 1rem;
        }
        p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #6b6557;
        }
        .custom-message {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128296;</div>
        <h1>メンテナンス中</h1>
        <p>
            現在システムメンテナンスを行っております。<br>
            しばらくお待ちください。
        </p>
        {% if message %}
        <div class="custom-message">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
