{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% trans "AI下書き生成" %}</title>
<link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-lg mx-auto p-4 mt-8">

  <div class="bg-white rounded-xl shadow-sm border p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-4">
      <i class="fas fa-magic text-indigo-500 mr-2"></i>{% trans "AI下書き生成" %}
    </h1>

    <form method="post" action="{% url 'social_draft_generate' %}">
      {% csrf_token %}

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "店舗" %}</label>
          <select name="store_id" required class="w-full border rounded-lg px-3 py-2 text-sm">
            {% for s in stores %}
            <option value="{{ s.pk }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "対象日" %}</label>
          <input type="date" name="target_date" class="w-full border rounded-lg px-3 py-2 text-sm"
                 value="{{ today|date:'Y-m-d' }}">
          <p class="text-xs text-gray-400 mt-1">{% trans "空の場合は本日が対象になります" %}</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{% trans "投稿先" %}</label>
          <div class="flex gap-3">
            <label class="flex items-center gap-1 text-sm">
              <input type="checkbox" name="platforms" value="x" checked> <i class="fab fa-x-twitter"></i> X
            </label>
            <label class="flex items-center gap-1 text-sm">
              <input type="checkbox" name="platforms" value="instagram"> <i class="fab fa-instagram text-pink-500"></i> Instagram
            </label>
            <label class="flex items-center gap-1 text-sm">
              <input type="checkbox" name="platforms" value="gbp"> <i class="fab fa-google text-blue-500"></i> GBP
            </label>
          </div>
        </div>

        <div class="flex gap-2 pt-2">
          <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition text-sm">
            <i class="fas fa-magic mr-1"></i>{% trans "生成する" %}
          </button>
          <a href="{% url 'social_draft_list' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 transition text-sm">
            {% trans "キャンセル" %}
          </a>
        </div>
      </div>
    </form>
  </div>

</div>
</body>
</html>
