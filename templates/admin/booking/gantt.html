{% extends "admin/base_site.html" %}
{% load i18n %}

{% block title %}{% trans "シフト管理" %} | {% trans 'サイト管理' %}{% endblock %}

{% block content %}
<h1>{% trans "シフト管理" %}</h1>

<div class="gantt-wrapper">
    <div class="gantt-toolbar">
        <div class="gantt-toolbar__nav">
            <button class="gantt-toolbar__nav-btn" id="gantt-prev" type="button">&#8592;</button>
            <span class="gantt-toolbar__title" id="gantt-title"></span>
            <button class="gantt-toolbar__nav-btn" id="gantt-next" type="button">&#8594;</button>
        </div>
        <div class="gantt-toolbar__views">
            <button class="gantt-toolbar__view-btn active" data-view="month" type="button">{% trans "月表示" %}</button>
            <button class="gantt-toolbar__view-btn" data-view="week" type="button">{% trans "週表示" %}</button>
        </div>
    </div>
    <div style="overflow-x:auto;">
        <div class="gantt-grid" id="gantt-grid"></div>
    </div>
    <div class="gantt-legend">
        <div class="gantt-legend__item">
            <div class="gantt-legend__swatch" style="background:#2271b1;"></div><span>{% trans "確定" %}</span>
        </div>
        <div class="gantt-legend__item">
            <div class="gantt-legend__swatch" style="background:#f0f6fc;border:1px dashed #2271b1;"></div><span>{% trans "出勤可能" %}</span>
        </div>
        <div class="gantt-legend__item">
            <div class="gantt-legend__swatch" style="background:#edfaef;border:1px dashed #00a32a;"></div><span>{% trans "希望" %}</span>
        </div>
        <div class="gantt-legend__item">
            <div class="gantt-legend__swatch" style="background:#f6f7f7;"></div><span>{% trans "不可" %}</span>
        </div>
    </div>
</div>

<script>
(function() {
    var now = new Date();
    var Y = now.getFullYear(), M = now.getMonth() + 1;
    var todayStr = now.toISOString().slice(0, 10);
    var WD = ['月','火','水','木','金','土','日'];
    var titleEl = document.getElementById('gantt-title');
    var gridEl = document.getElementById('gantt-grid');

    function load() {
        titleEl.textContent = Y + '年' + M + '月';
        fetch('/api/gantt/data/?year=' + Y + '&month=' + M)
            .then(function(r) { return r.json(); })
            .then(render)
            .catch(function() { gridEl.innerHTML = '<p style="padding:20px;">データ取得に失敗しました</p>'; });
    }

    function render(data) {
        var days = data.days, staff = data.staff;
        gridEl.style.gridTemplateColumns = '110px repeat(' + days.length + ', minmax(44px, 1fr))';
        gridEl.innerHTML = '';

        var h = document.createElement('div');
        h.className = 'gantt-grid__header-cell gantt-grid__header-cell--staff';
        h.textContent = 'スタッフ';
        gridEl.appendChild(h);

        days.forEach(function(d) {
            var c = document.createElement('div');
            c.className = 'gantt-grid__header-cell';
            if (d.date === todayStr) c.classList.add('gantt-grid__header-cell--today');
            if (d.weekday_num === 6) c.classList.add('gantt-grid__header-cell--sun');
            if (d.weekday_num === 5) c.classList.add('gantt-grid__header-cell--sat');
            c.innerHTML = '<div>' + d.day + '</div><div style="font-size:10px;font-weight:400;">' + WD[d.weekday_num] + '</div>';
            gridEl.appendChild(c);
        });

        staff.forEach(function(s) {
            var nc = document.createElement('div');
            nc.className = 'gantt-grid__staff-cell';
            nc.textContent = s.name;
            gridEl.appendChild(nc);
            s.cells.forEach(function(cell) {
                var el = document.createElement('div');
                el.className = 'gantt-grid__cell';
                if (cell.date === todayStr) el.classList.add('gantt-grid__cell--today');
                if (cell.type === 'assignment') {
                    var b = document.createElement('span');
                    b.className = 'gantt-block gantt-block--assignment';
                    b.textContent = cell.start_hour + '-' + cell.end_hour;
                    b.title = s.name + ' ' + cell.start_hour + ':00-' + cell.end_hour + ':00';
                    el.appendChild(b);
                } else if (cell.type === 'request') {
                    var b = document.createElement('span');
                    var p = cell.preference || 'available';
                    b.className = 'gantt-block gantt-block--' + p;
                    b.textContent = p === 'unavailable' ? '✕' : cell.start_hour + '-' + cell.end_hour;
                    el.appendChild(b);
                }
                gridEl.appendChild(el);
            });
        });

        if (!staff.length) {
            var e = document.createElement('div');
            e.style.cssText = 'grid-column:1/-1;padding:30px;text-align:center;color:#8c8f94;';
            e.textContent = 'スタッフデータがありません';
            gridEl.appendChild(e);
        }
    }

    document.getElementById('gantt-prev').onclick = function() { M--; if (M < 1) { M = 12; Y--; } load(); };
    document.getElementById('gantt-next').onclick = function() { M++; if (M > 12) { M = 1; Y++; } load(); };
    document.querySelectorAll('.gantt-toolbar__view-btn').forEach(function(b) {
        b.onclick = function() {
            document.querySelectorAll('.gantt-toolbar__view-btn').forEach(function(x) { x.classList.remove('active'); });
            b.classList.add('active');
        };
    });
    load();
})();
</script>
{% endblock %}
