{% load i18n %}
<h3>シフト編集</h3>
<p><strong>{{ assignment.staff.name }}</strong> - {{ assignment.date|date:"Y/m/d" }}</p>

<form id="shift-edit-form" onsubmit="return saveShift(event, {{ assignment.id }})">

  <div style="margin-bottom:10px;">
    <label>テンプレート適用:</label><br>
    {% for t in templates %}
    <button type="button" class="template-chip" style="background:{{ t.color }};margin:2px;"
            onclick="applyTemplate({{ t.id }}, {{ assignment.staff_id }}, '{{ assignment.date|date:'Y-m-d' }}')">
      {{ t.name }} ({{ t.start_time|time:"H:i" }}-{{ t.end_time|time:"H:i" }})
    </button>
    {% endfor %}
  </div>

  <div style="margin-bottom:10px;">
    <label>開始時刻:</label>
    <input type="time" name="start_time" id="edit-start-time" value="{{ assignment.start_time|time:'H:i'|default:'' }}" step="300" style="width:100%;padding:4px;">
  </div>

  <div style="margin-bottom:10px;">
    <label>終了時刻:</label>
    <input type="time" name="end_time" id="edit-end-time" value="{{ assignment.end_time|time:'H:i'|default:'' }}" step="300" style="width:100%;padding:4px;">
  </div>

  <div style="margin-bottom:10px;">
    <label>表示色:</label>
    <input type="hidden" name="color" id="edit-color" value="{{ assignment.color }}">
    <div id="edit-color-palette"></div>
    <script>
      (function(){
        var el = document.getElementById('edit-color-palette');
        if (el && typeof _colorPalette === 'function') {
          el.innerHTML = _colorPalette('edit-color', '{{ assignment.color }}');
        }
      })();
    </script>
  </div>

  <div style="margin-bottom:10px;">
    <label>備考:</label>
    <textarea name="note" id="edit-note" rows="3" style="width:100%;padding:4px;">{{ assignment.note }}</textarea>
  </div>

  <div style="display:flex;gap:8px;">
    <button type="submit" style="flex:1;padding:8px;background:#3B82F6;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;">
      保存
    </button>
    <button type="button" style="flex:1;padding:8px;background:#EF4444;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;"
            onclick="if(confirm('このシフトを削除しますか？')) deleteShift({{ assignment.id }})">
      削除
    </button>
  </div>
</form>

<script>
function saveShift(e, assignmentId) {
  e.preventDefault();
  var data = {
    start_time: document.getElementById('edit-start-time').value,
    end_time: document.getElementById('edit-end-time').value,
    color: document.getElementById('edit-color').value,
    note: document.getElementById('edit-note').value,
  };
  fetch('/api/shift/assignments/' + assignmentId + '/', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
    body: JSON.stringify(data),
    credentials: 'same-origin',
  }).then(function(r) {
    if (r.ok) location.reload();
    else r.text().then(function(t) { alert('保存エラー: ' + t); });
  });
  return false;
}

function deleteShift(assignmentId) {
  fetch('/api/shift/assignments/' + assignmentId + '/', {
    method: 'DELETE',
    headers: {'X-CSRFToken': '{{ csrf_token }}'},
    credentials: 'same-origin',
  }).then(function(r) {
    if (r.ok) location.reload();
    else alert('削除エラー');
  });
}

function applyTemplate(templateId, staffId, dateStr) {
  fetch('/api/shift/apply-template/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
    body: JSON.stringify({template_id: templateId, staff_id: staffId, date: dateStr}),
    credentials: 'same-origin',
  }).then(function(r) {
    if (r.ok) location.reload();
    else alert('テンプレート適用エラー');
  });
}
</script>
