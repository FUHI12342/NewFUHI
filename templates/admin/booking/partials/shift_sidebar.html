{% load i18n %}
<h3>シフト編集</h3>
<p><strong>{{ assignment.staff.name }}</strong> - {{ assignment.date|date:"Y/m/d" }}</p>

<form hx-put="/api/shift/assignments/{{ assignment.id }}/"
      hx-target="#cell-{{ assignment.staff_id }}-{{ assignment.date|date:'Y-m-d' }}"
      hx-swap="innerHTML">
  {% csrf_token %}

  <div style="margin-bottom:10px;">
    <label>テンプレート適用:</label><br>
    {% for t in templates %}
    <button type="button" class="template-chip" style="background:{{ t.color }};margin:2px;"
            hx-post="/api/shift/apply-template/"
            hx-vals='{"template_id": {{ t.id }}, "staff_id": {{ assignment.staff_id }}, "date": "{{ assignment.date|date:'Y-m-d' }}"}'
            hx-target="#cell-{{ assignment.staff_id }}-{{ assignment.date|date:'Y-m-d' }}"
            hx-swap="innerHTML">
      {{ t.name }} ({{ t.start_time|time:"H:i" }}-{{ t.end_time|time:"H:i" }})
    </button>
    {% endfor %}
  </div>

  <div style="margin-bottom:10px;">
    <label>開始時刻:</label>
    <input type="time" name="start_time" value="{{ assignment.start_time|time:'H:i'|default:'' }}" style="width:100%;padding:4px;">
  </div>

  <div style="margin-bottom:10px;">
    <label>終了時刻:</label>
    <input type="time" name="end_time" value="{{ assignment.end_time|time:'H:i'|default:'' }}" style="width:100%;padding:4px;">
  </div>

  <div style="margin-bottom:10px;">
    <label>表示色:</label>
    <input type="color" name="color" value="{{ assignment.color }}" style="width:100%;">
  </div>

  <div style="margin-bottom:10px;">
    <label>備考:</label>
    <textarea name="note" rows="3" style="width:100%;padding:4px;">{{ assignment.note }}</textarea>
  </div>

  <div style="display:flex;gap:8px;">
    <button type="submit" class="btn-primary" style="flex:1;padding:8px;background:#3B82F6;color:#fff;border:none;border-radius:4px;cursor:pointer;">
      保存
    </button>
    <button type="button" style="flex:1;padding:8px;background:#EF4444;color:#fff;border:none;border-radius:4px;cursor:pointer;"
            hx-delete="/api/shift/assignments/{{ assignment.id }}/"
            hx-target="#cell-{{ assignment.staff_id }}-{{ assignment.date|date:'Y-m-d' }}"
            hx-swap="innerHTML"
            hx-confirm="このシフトを削除しますか？">
      削除
    </button>
  </div>
</form>
