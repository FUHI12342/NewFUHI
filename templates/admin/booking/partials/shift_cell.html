{% if assignment %}
<div class="shift-block" style="background:{{ assignment.color }}"
     hx-get="/api/shift/detail/{{ assignment.id }}/"
     hx-target="#sidebar-content" hx-swap="innerHTML"
     onclick="event.stopPropagation(); var sd=document.getElementById('sidebar'); if(sd){sd.classList.remove('hidden')}">
  {% if assignment.start_time %}
    {{ assignment.start_time|time:"H:i" }}-{{ assignment.end_time|time:"H:i" }}
  {% else %}
    {{ assignment.start_hour }}:00-{{ assignment.end_hour }}:00
  {% endif %}
  {% if assignment.note %}<br><small>{{ assignment.note|truncatechars:15 }}</small>{% endif %}
</div>
{% endif %}
