<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 - ページが見つかりません</title>
<style>
body {
    font-family: "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", "メイリオ", Meiryo, sans-serif;
    color: #333333;
    background: #f1f0ec;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 1rem;
}
.container { text-align: center; max-width: 28rem; }
.code { font-size: 3.75rem; font-weight: bold; color: #8c876c; margin-bottom: 1rem; }
h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; }
p { color: #666; margin-bottom: 2rem; line-height: 1.6; }
a {
    display: inline-block;
    background: #8c876c;
    color: #fff;
    padding: 0.75rem 1.5rem;
    border-radius: 0.5rem;
    text-decoration: none;
}
a:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="container">
    <p class="code">404</p>
    <h1>ページが見つかりません</h1>
    <p>
        お探しのページは移動または削除された可能性があります。<br>
        URLをご確認の上、再度お試しください。
    </p>
    <a href="/">トップページへ戻る</a>
</div>
</body>
</html>
