# Security Headers Snippet — Updated 2026-03-23
# Shared across all location blocks via include

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Note: 'unsafe-eval' required by Alpine.js 3 standard CDN build (used in admin templates).
# To remove, migrate to @alpinejs/csp build in all 6 admin templates.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://platform.twitter.com https://www.instagram.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://www.google.com https://*.gstatic.com data: https:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.google.com https://maps.google.com https://platform.twitter.com https://syndication.twitter.com https://www.instagram.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://access.line.me;" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
