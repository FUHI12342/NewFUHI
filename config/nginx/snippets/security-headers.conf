# Security Headers Snippet — Updated 2026-04-13
# Nginx-managed headers only. Django handles CSP, X-Content-Type-Options,
# X-Frame-Options, Referrer-Policy, X-Robots-Tag, and TDM-* headers.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
